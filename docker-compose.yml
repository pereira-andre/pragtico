services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_portal_db
    environment:
      POSTGRES_DB: rag_portal
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init_extensions.sql:/docker-entrypoint-initdb.d/00-init_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_portal"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: pragtico_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${FLASK_PORT:-5050}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: ${FLASK_PORT:-5050}
      FLASK_ENV: ${FLASK_ENV:-production}
      APP_STORAGE_BACKEND: postgres
      RAG_INDEX_BACKEND: pgvector
      DATABASE_URL: postgresql://rag:rag@db:5432/rag_portal
      MIGRATE_LOCAL_DATA_ON_START: ${MIGRATE_LOCAL_DATA_ON_START:-1}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-troca-esta-chave-em-dev}
      # LLM provider (openrouter, gemini, openai, deepseek)
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      RAG_REINDEX_ON_START: ${RAG_REINDEX_ON_START:-0}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_REQUESTS_PER_MINUTE: ${EMBEDDING_REQUESTS_PER_MINUTE:-90}
      EMBEDDING_REQUESTS_PER_DAY: ${EMBEDDING_REQUESTS_PER_DAY:-900}
      WEATHERAPI_KEY: ${WEATHERAPI_KEY:-}
      WEATHERAPI_LOCATION: ${WEATHERAPI_LOCATION:-Setubal}
      AIS_MAP_CENTER: ${AIS_MAP_CENTER:-}
      AIS_MAP_ZOOM: ${AIS_MAP_ZOOM:-11}
      AIS_VESSELFINDER_NAMES: ${AIS_VESSELFINDER_NAMES:-1}
      AIS_PORT_LABEL: ${AIS_PORT_LABEL:-Porto de Setubal}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-64}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@porto.pt}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-123456}
    ports:
      - "${WEB_PORT:-5050}:${FLASK_PORT:-5050}"
    volumes:
      - ./:/app

volumes:
  pgdata:
